name: Bug report
description: Something in slideforge isn't working as expected.
labels: ["type:bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please check open issues first to avoid duplicates.
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - schema
        - mcp-server
        - compiler-slidev
        - compiler-hyperframes
        - cli
        - docs / other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, ideally with a minimal Deck/config that triggers it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: slideforge version
      placeholder: "e.g. 0.1.0, or commit SHA if running from source"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.11.0"
    validations:
      required: true
